abstract: >-
  MV-AFA (Multi-View Adaptive Fusion Attention) is an EEG seizure detection
  framework that integrates four complementary views of a 2-second EEG window:
  (1) temporal dynamics via a multi-scale patch Transformer,
  (2) spectral content via a multi-scale 2-D CNN on PSD maps,
  (3) hand-crafted statistical features (Hjorth, entropy, etc.), and
  (4) topological data analysis (TDA) features derived from Vietoris–Rips
  persistent homology (H0 and H1 summary statistics).
  A gated fusion mechanism learns adaptive per-sample branch weights,
  enabling interpretable attention over the four views. The model is trained
  cross-subject on all 24 CHB-MIT subjects using 2-second windows (4 s step)
  from the 18-channel bipolar montage. At inference, per-window seizure
  probabilities are temporally smoothed and gated by a persistence /
  minimum-duration / merge post-processor that suppresses isolated false
  positives, before emitting BIDS-compatible TSV annotations. On held-out
  continuous CHB-MIT recordings this yields high event sensitivity at well
  under 1 false alarm per 24 h.

# Training datasets used
datasets:
  - CHB-MIT Scalp EEG Database
